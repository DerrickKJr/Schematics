# Add this to the Schematics repo at:  .github/workflows/commit-script.yml
# Also add the helper tool to the Schematics repo root:  split_script.py
#
# SuperPlane's `github.runWorkflow` action dispatches this via workflow_dispatch,
# passing `idea` and `script` as inputs. It commits the generated EasyEDA Pro
# standalone script as a self-describing FOLDER, scripts/<slug>/, using the
# built-in GITHUB_TOKEN — no PAT, no deploy key, no stored secret.
#
#   scripts/<slug>/
#     script.js   - the runnable script, verbatim
#     README.md   - what the script is for (derived from the script's comments)
#     parts.json  - editable LCSC parts list (for the future update workflow)
#
# split_script.py derives README.md + parts.json mechanically, so no extra model
# tokens are spent describing the script or listing its parts.
name: Commit EasyEDA Script

on:
  workflow_dispatch:
    inputs:
      idea:
        description: Plain-language circuit idea (used for the filename + commit message)
        required: true
      script:
        description: Generated EasyEDA Pro standalone .js content
        required: true
      issue_body:
        description: >-
          Optional. Body of the modification issue. If it contains a line like
          "Schematic: scripts/<slug>", that <slug> folder is overwritten in place
          (the update/modify-existing flow). Omitted by the new-build webhook flow.
        required: false
        default: ""
      spec:
        description: >-
          Optional. The Spec Agent's design rationale; written to spec.md. Sent by the
          new-build webhook flow. Omitted by the modify flows, which keep any existing spec.md.
        required: false
        default: ""

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    env:
      # Pass inputs through the environment, never inline in run: — avoids shell
      # injection and breakage on quotes/newlines/backticks in the JS.
      IDEA: ${{ inputs.idea }}
      SCRIPT: ${{ inputs.script }}
      ISSUE_BODY: ${{ inputs.issue_body }}
      SPEC: ${{ inputs.spec }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build scripts/<slug>/ folder (script.js + README.md + parts.json)
        run: |
          # Write the raw script to a temp file so quotes/newlines/backticks in the
          # JS never hit the shell, then let split_script.py do the rest.
          printf '%s' "$SCRIPT" > /tmp/generated.js

          # Spec rationale (new builds only) -> spec.md. Empty on the modify flows.
          spec_arg=""
          if [ -n "$SPEC" ]; then
            printf '%s' "$SPEC" > /tmp/spec.md
            spec_arg="--spec-file /tmp/spec.md"
          fi

          # Update/modify flow: if the issue body names an existing schematic
          # ("Schematic: scripts/<slug>"), overwrite that folder in place.
          # Otherwise split_script.py derives the slug from the idea (new build).
          slug=$(printf '%s' "$ISSUE_BODY" \
            | grep -oiE 'scripts/[a-z0-9._-]+' \
            | head -1 \
            | sed -E 's#scripts/##')

          if [ -n "$slug" ]; then
            echo "Modify-in-place: scripts/$slug"
            python3 split_script.py --idea "$IDEA" --script-file /tmp/generated.js --out scripts --slug "$slug" $spec_arg
          else
            echo "New build: slug derived from idea"
            python3 split_script.py --idea "$IDEA" --script-file /tmp/generated.js --out scripts $spec_arg
          fi

      - name: Commit and push
        run: |
          git config user.name  "superplane-bot"
          git config user.email "bot@users.noreply.github.com"
          git add scripts/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Add verified EasyEDA script: $IDEA"
          git push
