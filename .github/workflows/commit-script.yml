# Add this to the Schematics repo at:  .github/workflows/commit-script.yml
# Also add the helper tool to the Schematics repo root:  split_script.py
#
# SuperPlane's `github.runWorkflow` action dispatches this via workflow_dispatch,
# passing `idea` and `script` as inputs. It commits the generated EasyEDA Pro
# standalone script as a self-describing FOLDER, scripts/<slug>/, using the
# built-in GITHUB_TOKEN — no PAT, no deploy key, no stored secret.
#
#   scripts/<slug>/
#     script.js   - the runnable script, verbatim
#     README.md   - what the script is for (derived from the script's comments)
#     parts.json  - editable LCSC parts list (for the future update workflow)
#
# split_script.py derives README.md + parts.json mechanically, so no extra model
# tokens are spent describing the script or listing its parts.
name: Commit EasyEDA Script

on:
  workflow_dispatch:
    inputs:
      idea:
        description: Plain-language circuit idea (used for the filename + commit message)
        required: true
      script:
        description: Generated EasyEDA Pro standalone .js content
        required: true

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    env:
      # Pass inputs through the environment, never inline in run: — avoids shell
      # injection and breakage on quotes/newlines/backticks in the JS.
      IDEA: ${{ inputs.idea }}
      SCRIPT: ${{ inputs.script }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build scripts/<slug>/ folder (script.js + README.md + parts.json)
        run: |
          # Write the raw script to a temp file so quotes/newlines/backticks in the
          # JS never hit the shell, then let split_script.py do the rest.
          printf '%s' "$SCRIPT" > /tmp/generated.js
          python3 split_script.py --idea "$IDEA" --script-file /tmp/generated.js --out scripts

      - name: Commit and push
        run: |
          git config user.name  "superplane-bot"
          git config user.email "bot@users.noreply.github.com"
          git add scripts/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Add verified EasyEDA script: $IDEA"
          git push
